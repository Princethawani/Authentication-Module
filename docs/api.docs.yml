openapi: 3.0.0

info:
  title: AuthServer API
  version: 1.0.0
  description: |
    A reusable, secure, and scalable authentication server for web and mobile applications Built with Node.js + TypeScript + Express + TypeORM + PostgreSQL + Redis

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.yourdomain.com
    description: Production server

# ── Security ──────────────────────────────────────────────────────────────────

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Enter: Bearer YOUR_ACCESS_TOKEN"

  # ── Schemas ──────────────────────────────────────────────────────────────────

  schemas:

    # ── Requests ───────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          example: SecurePass@123
          description: >
            Min 8 characters. Must include uppercase, lowercase,
            number, and special character.
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: SecurePass@123

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: a1b2c3d4e5f6...

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: john@example.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          example: abc123resettoken
        newPassword:
          type: string
          example: NewSecurePass@456

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe

    AssignRoleRequest:
      type: object
      required: [userId, roleName]
      properties:
        userId:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        roleName:
          type: string
          enum: [Admin, User, Moderator]
          example: Moderator

    EmailConfigRequest:
      type: object
      required:
        - appId
        - appName
        - fromEmail
        - fromName
        - smtpHost
        - smtpUsername
        - smtpPassword
      properties:
        appId:
          type: string
          example: football
        appName:
          type: string
          example: Football App
        fromEmail:
          type: string
          format: email
          example: noreply@football.com
        fromName:
          type: string
          example: Football Support
        smtpHost:
          type: string
          example: smtp.gmail.com
        smtpPort:
          type: integer
          example: 587
        smtpUsername:
          type: string
          example: noreply@football.com
        smtpPassword:
          type: string
          example: your-app-password
        useTls:
          type: boolean
          example: true
        isActive:
          type: boolean
          example: true

    # ── Responses ──────────────────────────────────────────────────────────────

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string
          example: [User]
        isEmailVerified:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 900
          description: Token lifetime in seconds
        user:
          $ref: '#/components/schemas/UserProfile'

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 900

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceInfo:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    ActivityLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum:
            - LOGIN
            - LOGOUT
            - FAILED_LOGIN
            - EMAIL_VERIFIED
            - PASSWORD_RESET
            - PASSWORD_CHANGED
            - PROFILE_UPDATED
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    EmailConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
        appName:
          type: string
        fromEmail:
          type: string
        fromName:
          type: string
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUsername:
          type: string
        useTls:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: INVALID_CREDENTIALS
        message:
          type: string
          example: Invalid email or password
        details:
          type: object
          nullable: true

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        meta:
          type: object
          properties:
            total:
              type: integer
              example: 100
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            totalPages:
              type: integer
              example: 5

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: 1.0.0
        environment:
          type: string
          example: development
    TotpCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          example: '123456'
          description: 6-digit TOTP code from authenticator app or an 8-character backup code

    TotpSetupResponse:
      type: object
      properties:
        secret:
          type: string
          example: JBSWY3DPEHPK3PXP
          description: Raw TOTP secret — use this for manual entry in authenticator app
        qrCodeUrl:
          type: string
          example: data:image/png;base64,...
          description: Base64 QR code image — render this as an <img> tag
        manualEntryCode:
          type: string
          example: JBSWY3DPEHPK3PXP
          description: Same as secret — displayed separately for clarity in the UI

    TotpEnableResponse:
      type: object
      properties:
        message:
          type: string
          example: 2FA enabled successfully. Save your backup codes — they will not be shown again.
        backupCodes:
          type: array
          items:
            type: string
          example: ['A1B2C3D4', 'E5F6G7H8', 'I9J0K1L2', 'M3N4O5P6', 'Q7R8S9T0', 'U1V2W3X4', 'Y5Z6A7B8', 'C9D0E1F2']
          description: One-time backup codes — each can only be used once. Store these securely.
      
    OAuthLinkedAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [google, github, apple]
          example: google
        email:
          type: string
          format: email
          nullable: true
          example: john@gmail.com
        displayName:
          type: string
          nullable: true
          example: John Doe
        avatarUrl:
          type: string
          nullable: true
          example: https://lh3.googleusercontent.com/...
        createdAt:
          type: string
          format: date-time

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /api/auth/health:
    get:
      tags: [System]
      summary: Health check
      description: Returns server status, timestamp, version, and environment.
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ── Authentication ───────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: |
        Creates a new user account and sends a verification email.
        The user must verify their email before they can log in.
      security: []
      parameters:
        - in: header
          name: X-App-ID
          schema:
            type: string
          required: false
          description: App ID for branded verification email
          example: football
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful — check email to verify
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login and receive tokens
      description: |
        Authenticates the user and returns a short-lived access token (15 min)
        and a long-lived refresh token (30 days).

        Account will be locked after 5 failed attempts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: Account locked due to too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token and refresh token.
        The old refresh token is immediately revoked (rotation).

        If a previously used refresh token is submitted, all sessions for that
        user are revoked (replay attack protection).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and revoke all sessions
      description: |
        Blacklists the current access token in Redis and revokes all
        refresh tokens for the user. Effective across all devices.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-email:
    get:
      tags: [Authentication]
      summary: Verify email address
      description: |
        Activates the user account using the token sent in the verification email.
        Token expires after 24 hours.
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: Email verification token from the email link
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request a password reset email
      description: |
        Sends a password reset link to the user's email.
        Always returns success to prevent email enumeration.
        Token expires after 1 hour.
      security: []
      parameters:
        - in: header
          name: X-App-ID
          schema:
            type: string
          required: false
          description: App ID for branded reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent if account exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password using token from email
      description: |
        Sets a new password using the reset token from the email link.
        All existing sessions are revoked after a successful reset.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── User ──────────────────────────────────────────────────────────────────────

  /api/auth/profile:
    get:
      tags: [User]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [User]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/activity:
    get:
      tags: [User]
      summary: Get current user activity log
      description: Returns the last 50 activity entries for the current user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/sessions:
    get:
      tags: [User]
      summary: List active sessions
      description: Returns all active refresh tokens (sessions) for the current user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/revoke-session/{tokenId}:
    post:
      tags: [User]
      summary: Revoke a specific session
      description: Revokes a single refresh token by ID. Useful for logging out from a specific device.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tokenId
          required: true
          schema:
            type: string
            format: uuid
          description: The session (refresh token) ID to revoke
      responses:
        '200':
          description: Session revoked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found or already revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Admin ─────────────────────────────────────────────────────────────────────

  /api/auth/users:
    get:
      tags: [Admin]
      summary: List all users (paginated)
      description: Returns a paginated list of all users. Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Results per page
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/assign-role:
    post:
      tags: [Admin]
      summary: Assign a role to a user
      description: Assigns one of the available roles to a user. Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '200':
          description: Role assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already has this role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/remove-role:
    post:
      tags: [Admin]
      summary: Remove a role from a user
      description: Removes a role from a user. Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '200':
          description: Role removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Email Config ──────────────────────────────────────────────────────────────

  /api/emailconfig:
    get:
      tags: [Email Config]
      summary: List all email configs
      description: Returns all email configurations. Admin only.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of email configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailConfig'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Email Config]
      summary: Create a new email config
      description: Adds a new app email configuration. Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailConfigRequest'
      responses:
        '201':
          description: Email config created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfig'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: App ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/emailconfig/{id}:
    get:
      tags: [Email Config]
      summary: Get one email config by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Email config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfig'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Email Config]
      summary: Update an email config
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailConfigRequest'
      responses:
        '200':
          description: Updated email config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfig'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Email Config]
      summary: Delete an email config
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/emailconfig/{id}/toggle:
    post:
      tags: [Email Config]
      summary: Toggle email config active/inactive
      description: Flips the isActive flag on an email config. Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Toggled email config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfig'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # ── Two-Factor Authentication (TOTP) ─────────────────────────────────────────

  /api/2fa/status:
    get:
      tags: [Two-Factor Authentication]
      summary: Get 2FA status
      description: Returns whether 2FA is enabled for the current user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA status
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnabled:
                    type: boolean
                    example: false
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/2fa/setup:
    post:
      tags: [Two-Factor Authentication]
      summary: Generate 2FA setup (QR code + secret)
      description: |
        Generates a TOTP secret and returns a QR code for the user to scan
        with their authenticator app (Google Authenticator, Authy, etc).

        2FA is **not yet enabled** after this step — the user must call
        `/api/2fa/enable` with a valid code to confirm setup.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: QR code and secret generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpSetupResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/2fa/enable:
    post:
      tags: [Two-Factor Authentication]
      summary: Enable 2FA by verifying setup code
      description: |
        Confirms 2FA setup by submitting the 6-digit code from the
        authenticator app. Returns 8 one-time backup codes.

        **Save the backup codes immediately — they will never be shown again.**
        Each backup code can only be used once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        '200':
          description: 2FA enabled — backup codes returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpEnableResponse'
        '400':
          description: 2FA not set up or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/2fa/disable:
    post:
      tags: [Two-Factor Authentication]
      summary: Disable 2FA
      description: |
        Disables 2FA for the current user. Requires a valid TOTP code
        or backup code to confirm the action.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        '200':
          description: 2FA disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: 2FA not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/2fa/validate:
    post:
      tags: [Two-Factor Authentication]
      summary: Validate 2FA code during login
      description: |
        Called during the login flow when the user has 2FA enabled.
        After a successful password check, the client submits the
        6-digit code here to complete authentication.

        Also accepts backup codes in place of a TOTP code.
        Each backup code can only be used once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        '200':
          description: 2FA validated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Invalid or expired authentication code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  # ── OAuth2 / Social Login ─────────────────────────────────────────────────────

  /api/oauth/google:
    get:
      tags: [OAuth2 / Social Login]
      summary: Login with Google
      description: |
        Redirects the user to Google's OAuth consent screen.
        After the user approves, Google redirects back to the callback URL.

        **This endpoint is browser-only** — open it directly in a browser,
        not via fetch/axios.
      security: []
      responses:
        '302':
          description: Redirects to Google OAuth consent screen

  /api/oauth/google/callback:
    get:
      tags: [OAuth2 / Social Login]
      summary: Google OAuth callback
      description: |
        Google redirects here after the user approves.
        On success, redirects to your frontend with tokens in query params:

        `OAUTH_SUCCESS_URL?accessToken=...&refreshToken=...&isNewUser=true`

        On failure, redirects to:

        `OAUTH_FAILURE_URL?error=...`
      security: []
      responses:
        '302':
          description: Redirects to frontend with tokens or error

  /api/oauth/github:
    get:
      tags: [OAuth2 / Social Login]
      summary: Login with GitHub
      description: |
        Redirects the user to GitHub's OAuth consent screen.

        **This endpoint is browser-only** — open it directly in a browser,
        not via fetch/axios.
      security: []
      responses:
        '302':
          description: Redirects to GitHub OAuth consent screen

  /api/oauth/github/callback:
    get:
      tags: [OAuth2 / Social Login]
      summary: GitHub OAuth callback
      description: |
        GitHub redirects here after the user approves.
        On success, redirects to your frontend with tokens in query params:

        `OAUTH_SUCCESS_URL?accessToken=...&refreshToken=...&isNewUser=true`

        On failure, redirects to:

        `OAUTH_FAILURE_URL?error=...`
      security: []
      responses:
        '302':
          description: Redirects to frontend with tokens or error
  
  /api/oauth/apple:
    get:
      tags: [OAuth2 / Social Login]
      summary: Login with Apple
      description: |
        Redirects the user to Apple's OAuth consent screen.

        **This endpoint is browser-only** — open it directly in a browser,
        not via fetch/axios.

        **Note:** Apple only sends the user's name on the very first login.
        Subsequent logins will not include name information.
      security: []
      responses:
        '302':
          description: Redirects to Apple OAuth consent screen

  /api/oauth/apple/callback:
    post:
      tags: [OAuth2 / Social Login]
      summary: Apple OAuth callback
      description: |
        Apple redirects here after the user approves.

        **Important:** Unlike Google and GitHub, Apple sends a POST request
        to the callback URL, not a GET. Your frontend must handle this.

        On success, redirects to your frontend with tokens in query params:

        `OAUTH_SUCCESS_URL?accessToken=...&refreshToken=...&isNewUser=true`

        On failure, redirects to:

        `OAUTH_FAILURE_URL?error=...`

        **Apple quirks:**
        - Name is only provided on first login
        - No avatar/profile picture provided
        - Requires an Apple Developer account ($99/year)
        - Only works with HTTPS in production
      security: []
      responses:
        '302':
          description: Redirects to frontend with tokens or error
          
  /api/oauth/linked:
    get:
      tags: [OAuth2 / Social Login]
      summary: Get linked OAuth accounts
      description: Returns all OAuth providers linked to the current user's account.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of linked OAuth accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OAuthLinkedAccount'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/oauth/unlink/{provider}:
    delete:
      tags: [OAuth2 / Social Login]
      summary: Unlink an OAuth provider
      description: |
        Removes the connection between the current user and the specified
        OAuth provider.

        Will fail if this is the user's only login method.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, github, apple]
          description: The OAuth provider to unlink
          example: google
      responses:
        '200':
          description: Provider unlinked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Cannot unlink only login method or invalid provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: OAuth account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: System
    description: Health check and server status
  - name: Authentication
    description: Register, login, logout, token refresh, email verification, password reset
  - name: User
    description: Profile management, activity logs, session management
  - name: Admin
    description: User management and role assignment — Admin role required
  - name: Email Config
    description: Multi-app email configuration management — Admin role required
  - name: Two-Factor Authentication
    description: TOTP-based 2FA — setup, enable, disable, and validate during login
  - name: OAuth2 / Social Login
    description: Login with Google or GitHub — browser redirect flow. Link and unlink providers from your account.