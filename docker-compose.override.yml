version: "3.9"

# This file is automatically merged with docker-compose.yml
# when you run: docker compose up
# It adds dev tools and hot reload on top of the base config

services:

  # ── Override authserver for development ────────────────────────────────────
  authserver:
    build:
      target: deps       # Use deps stage — has all devDependencies
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        until nc -z postgres 5432; do
          echo 'Postgres not ready — retrying in 2s...' &&
          sleep 2;
        done &&
        echo 'Postgres is ready!' &&
        until nc -z redis 6379; do
          echo 'Redis not ready — retrying in 2s...' &&
          sleep 2;
        done &&
        echo 'Redis is ready!' &&
        npm run seed &&
        npm run dev
      "
    volumes:
      - .:/app            # Mount source — changes reflect instantly
      - /app/node_modules # Keep container node_modules separate
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Adminer — Database UI ───────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: authserver_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ── Redis Commander — Redis UI ──────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: authserver_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis